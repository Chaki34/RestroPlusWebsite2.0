<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Restaurant Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body {
            background: #f5f7fb;
        }

        .page-title {
            font-weight: 700;
        }

        .order-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,.08);
            transition: .3s;
        }

        .order-card:hover {
            transform: translateY(-3px);
        }

        .customer-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #0d6efd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .info-label {
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .food-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
        }

        .status-badge {
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 30px;
        }

        .action-btns form {
            margin: 0;
        }

        .price-text {
            font-weight: 600;
            color: #198754;
        }

        @media (max-width: 768px) {

            .top-section {
                gap: 10px;
            }

            .action-btns {
                display: grid !important;
                grid-template-columns: 1fr;
            }

            .action-btns button {
                width: 100%;
            }

            .food-box .col-md-3,
            .food-box .col-md-2,
            .food-box .col-md-4 {
                margin-bottom: 12px;
            }
        }

    </style>
</head>

<body>

<div class="container py-4">

    <!-- HEADER -->

    <div class="d-flex justify-content-between align-items-center flex-wrap mb-4 gap-2">

        <h2 class="page-title mb-0">
            <i class="bi bi-bag-check-fill text-success"></i>
            Restaurant Orders
        </h2>

        <span class="badge bg-dark fs-6 px-3 py-2"
              th:text="${#lists.size(orders)} + ' Orders'">
        </span>

    </div>

    <!-- EMPTY STATE -->

    <div class="alert alert-info text-center"
         th:if="${#lists.isEmpty(orders)}">

        <i class="bi bi-bag-x-fill me-2"></i>
        No Orders Found

    </div>

    <!-- ORDERS -->

    <div class="card order-card mb-4"
         th:each="item : ${orders}">

        <div class="card-body">

            <!-- ORDER HEADER -->

            <div class="top-section d-flex justify-content-between align-items-center flex-wrap mb-3">

                <div>

                    <h5 class="mb-1">
                        Order #
                        <span th:text="${item.order.id}"></span>
                    </h5>

                    <small class="text-muted">
                        <i class="bi bi-calendar-event"></i>
                        <span th:text="${#temporals.format(item.order.orderDate,'dd MMM yyyy hh:mm a')}"></span>
                    </small>

                </div>

                <div>
                    <span class="badge bg-secondary status-badge"
                          th:text="${item.order.orderStatus}">
                    </span>
                </div>

            </div>

            <!-- CUSTOMER DETAILS -->

            <div class="row align-items-center mb-4">

                <div class="col-auto">
                    <div class="customer-icon">
                        <i class="bi bi-person-fill"></i>
                    </div>
                </div>

                <div class="col">

                    <div class="fw-bold"
                         th:text="${item.order.customerName}">
                    </div>

                    <div class="text-muted mt-1">
                        <i class="bi bi-telephone-fill me-1"></i>
                        <span th:text="${item.order.phoneNumber}"></span>
                    </div>

                    <div class="text-muted mt-1">
                        <i class="bi bi-geo-alt-fill me-1"></i>
                        <span th:text="${item.order.city}"></span>
                    </div>

                </div>

            </div>

            <!-- FOOD DETAILS -->

            <div class="food-box mb-4">

                <div class="row text-center text-md-start">

                    <div class="col-md-4">
                        <div class="info-label">Food Item</div>
                        <strong th:text="${item.menuCategoryDetails.menuCategory.categoryName}">
                        </strong>
                    </div>

                    <div class="col-md-2">
                        <div class="info-label">Quantity</div>
                        <strong th:text="${item.quantity}">
                        </strong>
                    </div>

                    <div class="col-md-3">
                        <div class="info-label">Item Price</div>
                        <span class="price-text">
                            ₹<span th:text="${item.itemPrice}"></span>
                        </span>
                    </div>

                    <div class="col-md-3">
                        <div class="info-label">Total Amount</div>
                        <span class="price-text">
                            ₹<span th:text="${item.totalPrice}"></span>
                        </span>
                    </div>

                </div>

            </div>

            <!-- ACTION BUTTONS -->

            <!-- ACTION BUTTONS -->

            <div class="action-btns d-flex flex-wrap gap-2">

                <!-- PLACED -->

                <div th:if="${item.order.orderStatus == 'PLACED'}">

                    <form method="post"
                          th:action="@{/orders/accept/{id}(id=${item.order.id})}"
                          class="d-inline">

                        <button type="submit"
                                class="btn btn-success">
                            <i class="bi bi-check-circle-fill"></i>
                            Accept
                        </button>

                    </form>

                    <form method="post"
                          th:action="@{/orders/reject/{id}(id=${item.order.id})}"
                          class="d-inline">

                        <button type="submit"
                                class="btn btn-danger">
                            <i class="bi bi-x-circle-fill"></i>
                            Reject
                        </button>

                    </form>

                </div>

                <!-- ACCEPTED -->

                <div th:if="${item.order.orderStatus == 'ACCEPTED'}">

                    <form method="post"
                          th:action="@{/orders/start/{id}(id=${item.order.id})}">

                        <button type="submit"
                                class="btn btn-warning">
                            <i class="bi bi-fire"></i>
                            Start Making
                        </button>

                    </form>

                </div>

                <!-- PREPARING -->

                <div th:if="${item.order.orderStatus == 'PREPARING'}">

                    <form method="post"
                          th:action="@{/orders/ready/{id}(id=${item.order.id})}">

                        <button type="submit"
                                class="btn btn-primary">
                            <i class="bi bi-box-seam"></i>
                            Ready
                        </button>

                    </form>

                </div>

                <!-- READY -->

                <div th:if="${item.order.orderStatus == 'READY'}">

                    <form method="post"
                          th:action="@{/orders/delivered/{id}(id=${item.order.id})}">

                        <button type="submit"
                                class="btn btn-dark">
                            <i class="bi bi-truck"></i>
                            Delivered
                        </button>

                    </form>

                </div>

                <!-- DELIVERED -->

                <div th:if="${item.order.orderStatus == 'DELIVERED'}">

        <span class="badge bg-success fs-6">
            <i class="bi bi-check-circle-fill"></i>
            Order Delivered
        </span>

                </div>

                <!-- REJECTED -->

                <div th:if="${item.order.orderStatus == 'REJECTED'}">

        <span class="badge bg-danger fs-6">
            <i class="bi bi-x-circle-fill"></i>
            Order Rejected
        </span>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
