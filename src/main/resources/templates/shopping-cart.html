<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            <i class="bi bi-cart-fill text-success"></i>
            Your Cart
        </h2>

        <a href="/"
           class="btn btn-outline-secondary">
            Continue Shopping
        </a>

    </div>

    <div class="card shadow border-0 rounded-4">

        <div class="card-body p-4">

            <div th:if="${#lists.isEmpty(cartItems)}">

                <div class="text-center py-5">

                    <i class="bi bi-cart-x"
                       style="font-size: 80px;"></i>

                    <h3 class="mt-3">
                        Cart is Empty
                    </h3>

                </div>

            </div>

            <div th:unless="${#lists.isEmpty(cartItems)}">

                <div class="table-responsive">

                    <table class="table align-middle">

                        <thead>

                        <tr>
                            <th>Image</th>
                            <th>Food</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="item : ${cartItems}">

                            <td>

                                <img th:src="${item.menuCategoryDetails.menuCategory.imageUrl}"
                                     width="80"
                                     class="rounded-3">

                            </td>

                            <td>

                                <h6 class="fw-bold"
                                    th:text="${item.menuCategoryDetails.menuCategory.categoryName}">
                                </h6>

                                <small class="text-muted"
                                       th:text="${item.menuCategoryDetails.description}">
                                </small>

                            </td>

                            <td>
                                ₹<span th:text="${item.menuCategoryDetails.price}"></span>
                            </td>

                            <td>

                                <div class="d-flex align-items-center gap-2">

                                    <a th:href="@{/cart/update-page/{id}/{action}(id=${item.id},action='minus')}"
                                       class="btn btn-danger btn-sm">
                                        -
                                    </a>

                                    <span class="fw-bold"
                                          th:text="${item.quantity}">
        </span>

                                    <a th:href="@{/cart/update-page/{id}/{action}(id=${item.id},action='plus')}"
                                       class="btn btn-success btn-sm">
                                        +
                                    </a>

                                </div>

                            </td>

                            <td>
                                ₹<span th:text="${item.totalPrice}"></span>
                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <div class="text-end mt-4">

                    <h3 class="fw-bold">

                        Grand Total :
                        ₹<span th:text="${grandTotal}"></span>

                    </h3>

                    <button class="btn btn-success btn-lg rounded-pill px-5 mt-3">

                        <i class="bi bi-bag-check-fill"></i>
                        Place Order

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
