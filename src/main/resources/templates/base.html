<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'RESTRO+ - Food Delivery'">RESTRO+</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --deliveroo-teal: #00ccbc;
            --deliveroo-dark: #2e3333;
            --deliveroo-gray: #f9fafa;
            --border-color: #e8ebeb;
            --text-main: #2e3333;
            --text-light: #585c5c;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #fff;
        }

        /* Navbar Style */
        .restro-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text {
            font-weight: 800;
            font-size: 24px;
            color: var(--deliveroo-teal);
            text-decoration: none;
        }

        .nav-right {
            display: flex;
            gap: 15px;
        }

        .btn-outline {
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-signup {
            background: var(--deliveroo-teal);
            color: white;
            border: none;
        }

        /* Footer Style */
        .site-footer {
            background: var(--deliveroo-dark);
            padding: 60px 40px 20px;
            color: white;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-col {
            background: #434848;
            padding: 25px;
            border-radius: 4px;
        }

        .footer-col h3 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .footer-col ul {
            list-style: none;
            padding: 0;
        }

        .footer-col ul li {
            margin-bottom: 10px;
            font-size: 14px;
            color: #bdc3c7;
            cursor: pointer;
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 40px auto 0;
            padding-top: 20px;
            border-top: 1px solid #434848;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #95a5a6;
        }
    </style>
</head>
<body>
<div th:fragment="layout(content)">
    <nav class="restro-navbar">
        <a href="/" class="logo-text">RESTRO+</a>
        <div class="nav-right">
            <a href="#" class="btn-outline"><i class="fas fa-home"></i> Log in / Sign up</a>
            <a href="#" class="btn-outline"><i class="fas fa-bars"></i> Menu</a>
        </div>
    </nav>

    <main th:replace="${content}"></main>

    <footer class="site-footer">
        <div class="footer-grid">
            <div class="footer-col">
                <h3>Discover RESTRO+</h3>
                <ul><li>Investors</li><li>About us</li><li>Takeaway</li><li>More</li><li>Newsroom</li></ul>
            </div>
            <div class="footer-col">
                <h3>Legal</h3>
                <ul><li>Terms and conditions</li><li>Privacy</li><li>Cookies</li></ul>
            </div>
            <div class="footer-col">
                <h3>Help</h3>
                <ul><li>Contact</li><li>FAQs</li><li>Cuisines</li><li>Brands</li></ul>
            </div>
            <div class="footer-col">
                <h3>Take RESTRO+ with you</h3>
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" width="120" style="margin-bottom:10px">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" width="120">
            </div>
        </div>
        <div class="footer-bottom">
            <div>© 2024 RESTRO+</div>
            <div style="display:flex; gap:20px"><i class="fab fa-facebook"></i> <i class="fab fa-twitter"></i> <i class="fab fa-instagram"></i></div>
        </div>
    </footer>
</div>
</body>
</html>
