<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${restaurant.resturentname} + ' | Restaurant Details'">Restaurant</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ================= FULL PAGE BLURRED BG ================= */

body::before{
    content: "";

    position: fixed;
    inset: 0;

    background-image: url('/images/bg.png');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    filter: blur(12px);

    transform: scale(1.08);

    z-index: -2;
}

/* DARK/LIGHT OVERLAY FOR BETTER VISIBILITY */
body::after{
    content: "";

    position: fixed;
    inset: 0;

    background: rgba(255,255,255,0.45);

    z-index: -1;
}

        /* HERO */
        .hero {
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .hero img {
            height: 360px;
            object-fit: cover;
            transition: transform .5s ease;
        }

        .hero:hover img {
            transform: scale(1.05);
        }

        .overlay {
            background: linear-gradient(to top, rgba(0,0,0,.85), rgba(0,0,0,.2));
        }

        /* GLASS CARD */
        .glass-card {
            backdrop-filter: blur(14px);
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,.08);
        }

        /* CATEGORY CHIP */
        .food-chip {
            background: #fff3e6;
            color: #b35400;
            font-weight: 500;
            transition: all .25s ease;
        }

        .food-chip:hover {
            background: #ff8c42;
            color: white;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 16px rgba(0,0,0,.15);
        }

        /* CATEGORY CARD */
        .cat-card {
            border-radius: 16px;
            overflow: hidden;
            transition: all .3s ease;
        }

        .cat-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0,0,0,.12);
        }

        .cat-card img {
            height: 150px;
            object-fit: cover;
        }

        /* BUTTON */
        .btn-modern {
            background: linear-gradient(135deg, #ff7a18, #ffb347);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            transition: .3s;
        }

        .btn-modern:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 18px rgba(0,0,0,.2);
        }

        /* ================= EXTRA RESPONSIVE PATCH (APPEND ONLY) ================= */

/* GENERAL MOBILE FIX */
@media (max-width: 576px) {

    body {
        font-size: 14px;
    }

    .container {
        padding-left: 12px !important;
        padding-right: 12px !important;
    }

    /* HERO TEXT */
    .hero-section h1 {
        font-size: 1.4rem !important;
        line-height: 1.3;
    }

    .hero-section p {
        font-size: 0.85rem;
    }

    /* SEARCH BAR */
    .search-pill {
        flex-direction: column;
        gap: 10px;
        padding: 10px;
    }

    .search-pill input {
        width: 100%;
        font-size: 0.9rem;
    }

    .btn-search {
        width: 100%;
        padding: 10px;
    }

    /* LOCATION + PROFILE TOP NAV */
    .top-nav {
        gap: 10px;
    }

    .location-box {
        width: 100%;
        font-size: 0.85rem;
    }

    .user-profile {
        width: 42px;
        height: 42px;
        font-size: 0.9rem;
    }

    /* CATEGORY SCROLL */
    .cat-scroll {
        gap: 10px;
        padding-bottom: 1rem;
    }

    .cat-card {
        min-width: 80px;
        padding: 1rem 0.5rem;
    }

    .cat-card i {
        font-size: 24px;
    }

    .cat-card span {
        font-size: 0.7rem;
    }

    /* FOOD CARDS */
    .food-card {
        padding: 0.75rem;
    }

    .food-img-container {
        height: 140px;
    }

    .rest-name {
        font-size: 1rem;
    }

    /* SECTION TITLE */
    .section-title {
        font-size: 1.2rem;
    }
}

/* TABLET FIX */
@media (min-width: 577px) and (max-width: 991px) {

    .hero-section h1 {
        font-size: 2rem;
    }

    .cat-card {
        min-width: 90px;
    }

    .food-img-container {
        height: 160px;
    }
}

/* SMALL SCROLL FIX (HORIZONTAL SMOOTHNESS) */
.cat-scroll {
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
}

/* PREVENT TEXT OVERFLOW */
.cat-card span,
.rest-name,
.section-title {
    word-break: break-word;
}

/* TOUCH IMPROVEMENT */
button, .btn, .cat-card, .food-card {
    touch-action: manipulation;
}

    </style>
</head>

<body>

<div class="container py-4">

    <!-- HERO -->
    <div class="hero shadow">

        <img th:src="${restaurant.imageUrl}" class="w-100">

        <div class="overlay position-absolute top-0 start-0 w-100 h-100"></div>

        <div class="position-absolute bottom-0 start-0 p-4 text-white">
            <h2 class="fw-bold mb-2" th:text="${restaurant.resturentname}"></h2>

            <span class="badge bg-warning text-dark px-3 py-2 rounded-pill">
                <i class="bi bi-shop"></i>
                <span th:text="${restaurant.type}"></span>
            </span>
        </div>
    </div>

    <!-- INFO CARD -->
    <div class="glass-card p-4 mt-4">

        <div class="d-flex justify-content-between flex-wrap">

            <p class="mb-2">
                👨‍🍳 <strong>Owner:</strong>
                <span th:text="${restaurant.ownername}"></span>
            </p>

            <p class="mb-2">
                ⭐ <strong>Rating:</strong>
                <span th:text="${restaurant.rating}"></span>/5
            </p>
        </div>

        <hr>

        <p class="mb-2">
            <i class="bi bi-geo-alt-fill text-danger"></i>
            <strong>Address:</strong>
            <span th:text="${restaurant.address}"></span>
        </p>

        <!-- CATEGORY CHIPS -->
        <h6 class="mt-4 text-uppercase fw-semibold text-muted">
            Food Categories
        </h6>

        <div class="d-flex flex-wrap gap-2 mt-2">

            <span class="badge rounded-pill px-3 py-2 food-chip"
                  th:each="cat : ${categories}"
                  th:text="${cat.categoryName}">
            </span>

            <span class="text-muted fst-italic"
                  th:if="${#lists.isEmpty(categories)}">
                No categories added yet
            </span>

        </div>

        <!-- BUTTON -->
        <div class="mt-4">
            <a th:href="@{/dashboard/user}" class="btn btn-modern w-100 py-2">
                ← Back to Dashboard
            </a>
        </div>

        <div class="mt-4">
            <button type="button"
                    class="btn btn-modern w-100 py-2"
                    data-bs-toggle="modal"
                    data-bs-target="#menuModal">
                🍽️ VIEW MENU CARD
            </button>
        </div>
    </div>

    <!-- CATEGORY SHOWCASE -->
    <div class="mt-5">

        <h5 class="fw-bold text-center mb-4 text-uppercase">
            🍽️ Explore Categories
        </h5>

        <div class="row g-4">

            <div class="col-6 col-md-4 col-lg-3"
                 th:each="cat : ${categories}">

                <div class="cat-card bg-white">

                    <!-- CATEGORY IMAGE WITH FALLBACK -->
                    <img class="w-100"
                         th:src="${cat.imageUrl != null and !#strings.isEmpty(cat.imageUrl)}
                         ? ${cat.imageUrl}
                         : 'https://images.unsplash.com/photo-1504674900247-0877df9cc836'"
                         onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836';"
                         alt="Category Image">

                    <div class="p-3 text-center">
                        <h6 class="fw-semibold mb-0"
                            th:text="${cat.categoryName}">
                        </h6>
                    </div>

                </div>

            </div>

            <!-- EMPTY STATE -->
            <div class="col-12 text-center text-muted fst-italic"
                 th:if="${#lists.isEmpty(categories)}">
                No categories to showcase
            </div>

        </div>
    </div>




</div>

<!-- MENU CARD MODAL -->
<div class="modal fade" id="menuModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">

        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title fw-bold">
                    🍽️ <span th:text="${restaurant.resturentname}"></span> Menu Card
                </h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- BODY -->
            <div class="modal-body text-center">

                <img class="img-fluid rounded shadow"
                     th:src="${restaurant.menuCard != null and !#strings.isEmpty(restaurant.menuCard)}
        ? ${restaurant.menuCard}
        : 'https://images.unsplash.com/photo-1551218808-94e220e084d2'"
                     onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1551218808-94e220e084d2';"
                     alt="Menu Card">

                <p class="text-muted mt-3">
                    Scan or view full menu card of this restaurant
                </p>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer justify-content-between">

                <a th:if="${restaurant.menuCard != null}"
                   th:href="${restaurant.menuCard}"
                   class="btn btn-success"
                   download>
                    ⬇ Download Menu
                </a>

                <a th:if="${restaurant.menuCard == null}"
                   href="#"
                   class="btn btn-secondary disabled">
                    No Menu Available
                </a>

                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Close
                </button>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
