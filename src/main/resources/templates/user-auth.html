<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Authentication</title>

    <style>
        body{
            font-family:Poppins,Arial;
            margin:0;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(to bottom,#fde2b5,#c8ffb8);
            transition:.4s ease-in-out;
        }
        body.register-mode{ background:linear-gradient(135deg,#ff9a9e,#ff0000); }

        .auth-box{
            width:480px;
            background:#fff;
            border-radius:18px;
            padding:28px;
            box-shadow:0 18px 36px rgba(0,0,0,.18);
            overflow:hidden;
        }

        .role-badge{
            background:#fff8e0;
            border:1px solid #ffc107;
            padding:6px 12px;
            border-radius:20px;
            font-weight:600;
        }
        body.register-mode .role-badge{ background:#ffe3e3; border:1px solid #ff4d4d; }

        .tabs{
            display:flex;
            gap:10px;
            margin:18px 0 12px 0;
        }
        .tab-btn{
            flex:1;
            padding:10px;
            border-radius:12px;
            border:1px solid #ffc107;
            background:#fff8e0;
            cursor:pointer;
            font-weight:600;
            transition:.3s;
        }
        .tab-btn.active{ background:#ffc107; }
        body.register-mode .tab-btn{ border:1px solid #ff4d4d; background:#ffe3e3; }
        body.register-mode .tab-btn.active{ background:#ff4d4d; color:white; }

        .form-wrapper{
            display:flex;
            width:200%;
            transform:translateX(0);
            transition:transform .45s ease-in-out;
        }
        .form{
            width:50%;
            opacity:.25;
            pointer-events:none;
            transform:scale(.97);
            transition:.35s;
        }
        .form.active{
            opacity:1;
            pointer-events:auto;
            transform:scale(1);
        }

        input{
            width:100%;
            padding:10px;
            border-radius:10px;
            border:1px solid #ddd;
            margin-top:8px;
        }

        .submit-btn{
            width:100%;
            margin-top:14px;
            padding:12px;
            border:none;
            border-radius:30px;
            font-weight:700;
            cursor:pointer;
            transition:.25s;
        }
        body:not(.register-mode) .submit-btn{ background:#ffc107; color:#000; }
        body.register-mode .submit-btn{ background:#ff4d4d; color:white; }
        .submit-btn:hover{ transform:translateY(-2px); box-shadow:0 10px 22px rgba(0,0,0,.18); }

        .error-msg{ color:red; margin:10px 0; font-weight:600; }
        .success-msg{ color:green; margin:10px 0; font-weight:600; }
    </style>

    <script>
        function switchTab(tab){
            const wrapper = document.querySelector(".form-wrapper");

            if(tab === "login"){
                wrapper.style.transform = "translateX(0)";
                document.body.classList.remove("register-mode");
            } else {
                wrapper.style.transform = "translateX(-50%)";
                document.body.classList.add("register-mode");
            }

            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById(tab+"Btn").classList.add("active");

            document.querySelectorAll(".form").forEach(f => f.classList.remove("active"));
            document.getElementById(tab).classList.add("active");
        }
    </script>
</head>

<body>

<div class="auth-box">

    <span class="role-badge">
        Selected Role: <span th:text="${role}">user</span>
    </span>

    <h2>User Authentication</h2>

    <div class="tabs">
        <button id="loginBtn" class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button id="registerBtn" class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <div class="form-wrapper">

        <!-- ================= LOGIN FORM ================= -->
        <div id="login" class="form active">
            <form th:action="@{/auth/user-login}" method="post">

                <input type="hidden" name="role" th:value="${role}">

                <input type="text" name="username" placeholder="register Phoneno" required>
                <input type="password" name="password" placeholder="Password" required>

                <!-- CSRF (safe when disabled) -->
                <th:block th:if="${_csrf != null}">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                </th:block>

                <button class="submit-btn" type="submit">Login</button>

                <p class="error-msg" th:if="${error != null}" th:text="${error}"></p>
                <p class="success-msg" th:if="${message != null}" th:text="${message}"></p>
            </form>
        </div>

        <!-- ================= REGISTER FORM ================= -->
        <div id="register" class="form">
            <form th:action="@{/auth/user-register}" method="post">

                <input type="hidden" name="role" th:value="${role}">

                <input type="text" name="username" placeholder="Create Username" required>
                <input type="number" name="phoneno" placeholder="Phone Number" required>
                <input type="password" name="password" placeholder="Create Password" required>

                <!-- CSRF (safe when disabled) -->
                <th:block th:if="${_csrf != null}">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                </th:block>

                <button class="submit-btn" type="submit">Create Account</button>

                <p class="error-msg" th:if="${error != null}" th:text="${error}"></p>
                <p class="success-msg" th:if="${message != null}" th:text="${message}"></p>
            </form>
        </div>

    </div>

</div>

</body>
</html>
