<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category Details</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow border-0 rounded-4">

        <div class="card-body p-5">

            <h2 class="fw-bold mb-4">
                <span th:text="${category.categoryName}"></span>
                Details
            </h2>

            <form th:action="@{/category/details/save}"
                  method="post">

                <input type="hidden"
                       name="categoryId"
                       th:value="${category.id}">

                <div class="mb-4">
                    <label class="form-label fw-bold">
                        Description
                    </label>

                    <textarea class="form-control"
                              rows="4"
                              name="description"
                              th:text="${details.description != null ? details.description : 'No description set'}">
                    </textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">
                        How It Is Made
                    </label>

                    <textarea class="form-control"
                              rows="4"
                              name="howItIsMade"
                              th:text="${details.howItIsMade != null ? details.howItIsMade : 'No cooking process added'}">
                    </textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">
                        Ingredients
                    </label>

                    <textarea class="form-control"
                              rows="4"
                              name="ingredients"
                              th:text="${details.ingredients != null ? details.ingredients : 'No ingredients added'}">
                    </textarea>
                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">
                            Base Price
                        </label>

                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="price"
                               th:value="${details.price}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">
                            Rating
                        </label>

                        <input type="number"
                               step="0.1"
                               class="form-control"
                               name="rating"
                               th:value="${details.rating}">
                    </div>

                </div>

                <hr class="my-4">

                <h4 class="fw-bold mb-3">Size Pricing</h4>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Small</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="sizeSmallPrice"
                               th:value="${details.sizeSmallPrice}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Medium</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="sizeMediumPrice"
                               th:value="${details.sizeMediumPrice}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Large</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="sizeLargePrice"
                               th:value="${details.sizeLargePrice}">
                    </div>

                </div>

                <hr class="my-4">

                <h4 class="fw-bold mb-3">Options</h4>

                <div class="row">

                    <div class="col-md-3 form-check mb-3">
                        <input type="checkbox"
                               class="form-check-input"
                               name="extraSpicy"
                               th:checked="${details.extraSpicy}">

                        <label class="form-check-label">
                            Extra Spicy
                        </label>
                    </div>

                    <div class="col-md-3 form-check mb-3">
                        <input type="checkbox"
                               class="form-check-input"
                               name="extraCheese"
                               th:checked="${details.extraCheese}">

                        <label class="form-check-label">
                            Extra Cheese
                        </label>
                    </div>

                    <div class="col-md-3 form-check mb-3">
                        <input type="checkbox"
                               class="form-check-input"
                               name="veg"
                               th:checked="${details.veg}">

                        <label class="form-check-label">
                            Veg
                        </label>
                    </div>

                    <div class="col-md-3 form-check mb-3">
                        <input type="checkbox"
                               class="form-check-input"
                               name="nonVeg"
                               th:checked="${details.nonVeg}">

                        <label class="form-check-label">
                            Non Veg
                        </label>
                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">
                            Preparation Time
                        </label>

                        <input type="text"
                               class="form-control"
                               name="preparationTime"
                               th:value="${details.preparationTime != null ? details.preparationTime : 'Not Set'}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">
                            Available
                        </label>

                        <select class="form-select"
                                name="available">

                            <option value="true"
                                    th:selected="${details.available == true}">
                                Yes
                            </option>

                            <option value="false"
                                    th:selected="${details.available == false}">
                                No
                            </option>

                        </select>
                    </div>

                </div>

                <button type="submit"
                        class="btn btn-primary btn-lg mt-4 px-5">
                    Save Details
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
